name: Feature Request
description: Suggest an idea for this SDK
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
  - type: input
    id: summary
    attributes:
      label: Feature Summary
      description: A clear and concise one-line summary of the feature.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe how you think this feature should work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false
  - type: checkboxes
    id: affected_client
    attributes:
      label: Affected Client
      description: Which parts of the SDK would this feature affect?
      options:
        - label: StandardCheckout
        - label: CustomCheckout
        - label: Subscription
        - label: Common / Infrastructure
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
