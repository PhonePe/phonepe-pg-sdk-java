name: Bug Report
description: Create a report to help us improve the SDK
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: dropdown
    id: sdk_version
    attributes:
      label: SDK Version
      description: What version of the pg-sdk-java are you using?
      options:
        - 2.2.3
        - 2.2.2
        - 2.2.1
        - Other (specify in description)
    validations:
      required: true
  - type: input
    id: java_version
    attributes:
      label: Java Version
      description: What version of JDK are you using? (e.g., 17, 21)
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which PhonePe environment does this bug occur in?
      options:
        - SANDBOX
        - PRODUCTION
    validations:
      required: true
  - type: dropdown
    id: client_type
    attributes:
      label: Client Type
      description: Which SDK client are you using?
      options:
        - StandardCheckoutClient
        - CustomCheckoutClient
        - SubscriptionClient
        - BaseClient / Infrastructure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Initialize client with...
        2. Create request...
        3. Call pay()...
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: error_logs
    attributes:
      label: Error Logs or Stack Traces
      description: Paste any relevant error messages or stack traces here.
      render: java
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, related issues, etc).
    validations:
      required: false
